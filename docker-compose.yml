services:
  cookcli:
    image: ghcr.io/cooklang/cookcli:latest
    # Set user to match your host UID:GID to avoid permission issues with mounted volumes.
    # Find your IDs with: id -u && id -g
    user: "1000:1000"
    ports:
      - "9080:9080"
    volumes:
      - ./recipes:/recipes
    restart: unless-stopped
